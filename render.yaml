services:
  - type: web
    name: studybot-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --chdir backend --bind 0.0.0.0:$PORT
    port: 8000
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: MODEL_PATH
        value: grade_model.pkl
      - key: PYTHON_VERSION
        value: 3.11.0
